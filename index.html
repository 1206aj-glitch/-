<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하늘스크린교회 말씀 아카이브</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { font-family:'Noto Sans KR',sans-serif; background:#f8fafc; }
  .serif { font-family:'Noto Serif KR',serif; }
  .sermon-card { transition:all .3s cubic-bezier(.4,0,.2,1); }
  .sermon-card:hover { transform:translateY(-4px); box-shadow:0 12px 28px rgba(15,23,42,.1); }
  .active-btn { background:#1e1b4b!important; color:#fff!important; }

  /* ── 플레이어 래퍼 ── */
  .player-wrap {
    position:relative; width:100%; padding-bottom:56.25%;
    background:#0f172a; border-radius:14px; overflow:hidden;
  }
  .player-wrap > * {
    position:absolute; inset:0; width:100%; height:100%; border:none;
  }

  /* ── 썸네일 오버레이 ── */
  .thumb-overlay {
    cursor:pointer; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    background:rgba(0,0,0,.35); transition:background .2s;
  }
  .thumb-overlay:hover { background:rgba(0,0,0,.55); }
  .thumb-overlay img.thumb-bg {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; transition:transform .3s,filter .3s;
  }
  .thumb-overlay:hover img.thumb-bg { transform:scale(1.04); filter:brightness(.7); }
  .play-ring {
    position:relative; z-index:2;
    width:72px; height:72px; border-radius:50%;
    background:#ff0000; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 24px rgba(0,0,0,.5); transition:transform .2s,box-shadow .2s;
  }
  .thumb-overlay:hover .play-ring { transform:scale(1.12); box-shadow:0 8px 32px rgba(255,0,0,.45); }
  .play-ring svg { margin-left:5px; }
  .play-label {
    position:relative; z-index:2;
    color:#fff; font-size:13px; font-weight:700;
    text-shadow:0 2px 8px rgba(0,0,0,.8); letter-spacing:.02em;
  }

  /* ── 타임라인 ── */
  .tl-btn { transition:all .15s; }
  .tl-btn:hover { background:#eef2ff; border-color:#818cf8; }
  .tl-btn.active { background:#eef2ff!important; border-color:#4f46e5!important; }
  .tl-btn.active .tl-badge { background:#4f46e5!important; color:#fff!important; }

  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#f1f5f9}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body class="text-slate-800 antialiased">

<!-- ══ HEADER ══ -->
<header class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <div class="bg-indigo-950 text-amber-400 p-2.5 rounded-xl shadow-md">
        <i class="fa-solid fa-church text-2xl"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold text-slate-900 tracking-wide serif">하늘스크린교회</h1>
        <p class="text-xs text-indigo-600 font-bold">AI 상황별 말씀 매칭 &amp; 타임 싱크로 아카이브</p>
      </div>
    </div>
    <div class="flex items-center space-x-2">
      <button onclick="toggleUpload()" class="text-xs bg-indigo-950 hover:bg-indigo-900 text-white font-bold px-4 py-2.5 rounded-xl transition shadow-md flex items-center gap-1.5">
        <i class="fa-solid fa-square-plus"></i><span>새 말씀 등록</span>
      </button>
      <button onclick="resetDB()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-500 font-semibold px-3 py-2.5 rounded-xl transition">
        <i class="fa-solid fa-arrow-rotate-left"></i> 초기화
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <!-- 배너 -->
  <div class="bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 rounded-3xl p-8 text-white mb-10 shadow-xl border border-indigo-900/40 relative overflow-hidden">
    <div class="absolute right-0 bottom-0 opacity-5 text-[14rem] translate-x-12 translate-y-16 pointer-events-none"><i class="fa-solid fa-quote-right"></i></div>
    <span class="bg-amber-400/20 text-amber-300 text-xs font-bold px-3 py-1 rounded-full border border-amber-400/30">2026 영적 은혜 가동 전선</span>
    <h2 class="text-xl sm:text-2xl font-bold mt-4 mb-2 serif text-amber-100">"내 형편에 맞는 생명의 만나와 영적 전술 노트를 펼쳐라"</h2>
    <p class="text-slate-300 text-sm max-w-4xl font-light leading-relaxed">말씀 카드를 클릭하면 영상이 재생됩니다. 타임라인 항목을 누르면 해당 시간대로 즉시 이동합니다.</p>
  </div>

  <!-- 등록 폼 -->
  <div id="uploadSection" class="hidden bg-white rounded-3xl p-6 shadow-lg border border-slate-200 mb-10 space-y-4">
    <div class="flex items-center justify-between border-b border-slate-100 pb-3">
      <h3 class="text-base font-bold text-slate-900"><i class="fa-solid fa-code text-indigo-600 mr-2"></i>말씀 등록</h3>
      <span class="text-xs text-amber-600 font-bold bg-amber-50 px-2.5 py-1 rounded-lg border border-amber-200"><i class="fa-solid fa-key"></i> 비밀번호: 1234</span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
      <div class="space-y-3">
        <div><label class="block font-bold text-slate-600 mb-1">제목 *</label><input type="text" id="fTitle" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none text-slate-900"></div>
        <div><label class="block font-bold text-slate-600 mb-1">유튜브 주소 또는 퍼가기 코드 *</label><textarea id="fUrl" rows="2" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none font-mono text-indigo-950"></textarea></div>
        <div class="grid grid-cols-2 gap-2">
          <div><label class="block font-bold text-slate-600 mb-1">날짜 *</label><input type="date" id="fDate" value="2026-06-20" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none"></div>
          <div><label class="block font-bold text-slate-600 mb-1">분류 *</label>
            <select id="fCategory" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none font-bold text-slate-900">
              <option>통합설교</option><option>음악설교</option><option>주일예배</option><option>비전설교</option><option>영화설교</option><option>문학설교</option>
            </select>
          </div>
        </div>
        <div><label class="block font-bold text-slate-600 mb-1">비밀번호 *</label><input type="password" id="fPw" class="w-full bg-amber-50 border border-amber-300 rounded-lg p-2.5 outline-none font-bold"></div>
      </div>
      <div class="space-y-3">
        <div><label class="block font-bold text-slate-600 mb-1">요약 *</label><textarea id="fSummary" rows="2" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none font-light"></textarea></div>
        <div><label class="block font-bold text-slate-600 mb-1">노트 &amp; 해시태그</label><textarea id="fNotes" rows="2" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none font-light"></textarea></div>
        <div><label class="block font-bold text-slate-600 mb-1">타임라인 *</label><textarea id="fTimeline" rows="2" placeholder="[00:05:12] 제목" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2.5 outline-none font-mono"></textarea></div>
      </div>
    </div>
    <div class="flex justify-end space-x-2 pt-2 border-t border-slate-100">
      <button onclick="toggleUpload()" class="bg-slate-100 text-slate-600 font-bold text-xs px-4 py-2.5 rounded-lg">닫기</button>
      <button onclick="saveSermon()" class="bg-indigo-950 hover:bg-indigo-900 text-white font-bold text-xs px-6 py-2.5 rounded-lg shadow-md"><i class="fa-solid fa-cloud-arrow-up"></i> 등록</button>
    </div>
  </div>

  <!-- 필터 -->
  <div class="bg-white rounded-3xl p-6 shadow-md border border-slate-200 mb-10 space-y-5">
    <div class="relative">
      <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
      <input type="text" id="searchInput" oninput="filterCards()" placeholder="키워드, 성경 구절, 찬양 곡명으로 검색..."
        class="w-full bg-slate-50 border border-slate-300 rounded-xl pl-12 pr-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:bg-white transition">
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 border-t border-slate-100 pt-4">
      <div>
        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2"><i class="fa-solid fa-clock-rotate-left mr-1 text-indigo-600"></i>연도</label>
        <select id="yearFilter" onchange="filterCards()" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-600">
          <option value="all">전체</option><option value="2026">2026년</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2"><i class="fa-regular fa-calendar-days mr-1 text-indigo-600"></i>월별</label>
        <div class="flex flex-wrap gap-1.5" id="monthTabs"></div>
      </div>
    </div>
    <div class="border-t border-slate-100 pt-4">
      <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2"><i class="fa-solid fa-heart-pulse mr-1 text-indigo-600"></i>마음 상황별 처방</label>
      <div class="flex flex-wrap gap-2" id="sitTabs">
        <button onclick="setSit('all')" data-sit="all" class="tab-sit active-btn px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 transition">모든 형편</button>
        <button onclick="setSit('상처치유')" data-sit="상처치유" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">🩹 상처·자존감 치유</button>
        <button onclick="setSit('우울불안')" data-sit="우울불안" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">💭 우울·불안·고독</button>
        <button onclick="setSit('고난시련')" data-sit="고난시련" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">🔥 연단과 시련</button>
        <button onclick="setSit('실패결핍')" data-sit="실패결핍" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">📉 파선·결핍·실패</button>
        <button onclick="setSit('분노용서')" data-sit="분노용서" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">⚓ 미움·분노·용서</button>
        <button onclick="setSit('가정가족')" data-sit="가정가족" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">🏠 부부·자녀·가정</button>
        <button onclick="setSit('조급인내')" data-sit="조급인내" class="tab-sit px-4 py-2 rounded-xl text-xs font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">⏳ 조급함·기다림</button>
      </div>
    </div>
    <p class="text-xs text-slate-400 font-bold border-t border-slate-100 pt-3" id="counter"><i class="fa-solid fa-database mr-2 text-indigo-500"></i>로딩 중...</p>
  </div>

  <!-- 카드 그리드 -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="cardGrid"></div>
</main>

<!-- ══ 말씀 모달 ══ -->
<div id="modal" class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl max-w-6xl w-full max-h-[92vh] overflow-y-auto shadow-2xl border border-slate-200 flex flex-col">

    <!-- 모달 헤더 -->
    <div class="p-5 border-b border-slate-200 bg-slate-50 rounded-t-3xl flex items-start justify-between flex-shrink-0">
      <div class="flex-1 min-w-0 mr-4">
        <span id="mCat" class="bg-indigo-100 text-indigo-950 text-xs font-bold px-3 py-1 rounded-full border border-indigo-200"></span>
        <h3 id="mTitle" class="text-lg font-bold mt-2 text-slate-900 serif leading-snug"></h3>
        <p id="mMeta" class="text-xs text-slate-500 mt-1.5 font-medium"></p>
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-2.5 rounded-full hover:bg-slate-200 transition flex-shrink-0">
        <i class="fa-solid fa-xmark text-2xl"></i>
      </button>
    </div>

    <!-- 모달 바디 -->
    <div class="p-5 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1">

      <!-- 좌: 플레이어 -->
      <div class="lg:col-span-7 flex flex-col gap-4">

        <!-- ★ 핵심: 썸네일(클릭 전) / iframe(클릭 후) 토글 영역 -->
        <div class="player-wrap" id="playerBox">
          <!-- JS가 여기에 썸네일 또는 iframe을 주입 -->
        </div>

        <!-- 유튜브 바로가기 -->
        <a id="ytLink" href="#" target="_blank"
           class="flex items-center justify-center gap-2 bg-slate-900 hover:bg-red-700 text-white text-xs font-bold py-2.5 rounded-xl transition">
          <i class="fa-brands fa-youtube text-red-500 text-base"></i>
          <span id="ytLinkText">유튜브에서 보기</span>
          <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
        </a>

        <!-- 요약 / 노트 (데스크톱) -->
        <div class="hidden lg:flex flex-col gap-4">
          <div>
            <p class="text-xs font-bold text-indigo-700 uppercase tracking-widest mb-1.5"><i class="fa-solid fa-quote-left mr-2"></i>영적 본질 요약</p>
            <p id="mSummary" class="text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-200 font-light"></p>
          </div>
          <div>
            <p class="text-xs font-bold text-indigo-700 uppercase tracking-widest mb-1.5"><i class="fa-solid fa-scroll mr-2"></i>인사이트 &amp; 전술 노트</p>
            <div id="mNotes" class="text-sm text-indigo-950 font-medium leading-relaxed bg-indigo-50/40 p-4 rounded-xl border border-indigo-100 whitespace-pre-line serif"></div>
          </div>
        </div>
      </div>

      <!-- 우: 타임라인 -->
      <div class="lg:col-span-5 flex flex-col gap-3">
        <div class="flex items-center justify-between">
          <p class="text-xs font-bold text-indigo-700 uppercase tracking-widest"><i class="fa-solid fa-list-ol mr-1.5"></i>타임라인 인덱스</p>
          <span class="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded-full">클릭 → 해당 시간으로 이동</span>
        </div>

        <div id="tlList" class="flex flex-col gap-2 overflow-y-auto pr-1" style="max-height:420px"></div>

        <!-- 현재 재생 중 표시 -->
        <div id="nowPlaying" class="hidden bg-indigo-950 rounded-xl p-3 text-white text-xs">
          <div class="flex items-center gap-2 mb-1">
            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse inline-block"></span>
            <span class="font-bold text-amber-300 uppercase tracking-wide">지금 재생 중</span>
          </div>
          <p id="nowText" class="text-slate-200 leading-snug font-medium"></p>
        </div>

        <!-- 요약 / 노트 (모바일) -->
        <div class="lg:hidden flex flex-col gap-4 border-t border-slate-100 pt-4 mt-2">
          <div>
            <p class="text-xs font-bold text-indigo-700 uppercase tracking-widest mb-1.5"><i class="fa-solid fa-quote-left mr-2"></i>영적 본질 요약</p>
            <p id="mSummaryM" class="text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-200 font-light"></p>
          </div>
          <div>
            <p class="text-xs font-bold text-indigo-700 uppercase tracking-widest mb-1.5"><i class="fa-solid fa-scroll mr-2"></i>인사이트 &amp; 전술 노트</p>
            <div id="mNotesM" class="text-sm text-indigo-950 font-medium leading-relaxed bg-indigo-50/40 p-4 rounded-xl border border-indigo-100 whitespace-pre-line serif"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 알림 모달 -->
<div id="alertModal" class="fixed inset-0 z-50 hidden bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-slate-200 text-center space-y-4">
    <div id="alertIcon" class="w-12 h-12 rounded-full flex items-center justify-center mx-auto text-xl"></div>
    <h4 id="alertTitle" class="text-base font-bold text-slate-900 serif"></h4>
    <p id="alertMsg" class="text-xs text-slate-500 leading-relaxed font-light"></p>

  </div>
</div>

// 상태

let db = [];
let curMonth = 'all', curSit = 'all';
let activeItem = null;
let progressTimer = null;
let playStartWall = 0, playStartSec = 0;

// ────────────────────────────────────────────────
// 상황 분류
// ────────────────────────────────────────────────
function classify(t, s, n) {
  const txt = (t+' '+s+' '+n).toLowerCase();
  if (/상처|자존감|치유|흉터|킨츠기|포이에마/.test(txt)) return '상처치유';
  if (/우울|불안|고독|파라클레토스|보혜사|외로움/.test(txt)) return '우울불안';
  if (/고난|시련|풀무질|정금|연단|부활/.test(txt)) return '고난시련';
  if (/실패|결핍|파선|덩케르크|고립|벤치|야니스/.test(txt)) return '실패결핍';
  if (/미움|분노|용서|토포스|아피에미|방화/.test(txt)) return '분노용서';
  if (/가정|가족|부부|자녀|사도세자|베라카|에제르|배필/.test(txt)) return '가정가족';
  if (/조급|인내|기다림|카이로스|크로노스|안개|스케줄/.test(txt)) return '조급인내';
  return '고난시련';
}

// ────────────────────────────────────────────────
// 플레이어: 썸네일 → iframe 전환
// 핵심: iframe src에 origin 파라미터를 넣지 않음
//        → 오류 153 완전 해결
// ────────────────────────────────────────────────
function showThumb(videoId) {
  const box = document.getElementById('playerBox');
  const thumbUrl = 'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg';
  box.innerHTML =
    '<img class="thumb-bg" src="' + thumbUrl + '" onerror="this.src=\'https://i.ytimg.com/vi/' + videoId + '/default.jpg\'">' +
    '<div class="thumb-overlay" onclick="openInYouTube(0)">' +
      '<div class="play-ring"><svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>' +
      '<span class="play-label">▶ 유튜브에서 재생하기</span>' +
    '</div>';
}

// youtube.com/embed 는 로컬(file://) 환경에서 항상 오류 153 발생
// → embed 완전 제거, 유튜브 새 탭으로 직접 열기
function openInYouTube(startSec) {
  if (!activeItem) return;
  const url = 'https://www.youtube.com/watch?v=' + activeItem.id
            + (startSec > 0 ? '&t=' + startSec + 's' : '');
  window.open(url, '_blank');

  // 썸네일 영역 → "재생 중" 안내 화면으로 전환
  const box = document.getElementById('playerBox');
  const vid = activeItem.id;
  const sec = startSec || 0;
  const thumbUrl = 'https://i.ytimg.com/vi/' + vid + '/hqdefault.jpg';
  box.innerHTML =
    '<img class="thumb-bg" src="' + thumbUrl + '" style="filter:brightness(0.3)">' +
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;">' +
      '<div style="background:#ff0000;border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,0,0,.5)">' +
        '<svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>' +
      '</div>' +
      '<p style="color:#fff;font-size:14px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.9)">유튜브에서 재생 중</p>' +
      '<p style="color:#94a3b8;font-size:11px;line-height:1.7;max-width:240px">새 탭에서 영상을 시청하세요.<br>아래 타임라인을 클릭하면<br>해당 시간부터 바로 재생됩니다.</p>' +
      '<button onclick="openInYouTube(' + sec + ')" style="background:#ff0000;color:#fff;border:none;border-radius:10px;padding:8px 22px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(255,0,0,.4)">다시 열기 ↗</button>' +
    '</div>';

  playStartWall = Date.now();
  playStartSec  = sec;
  startProgress();
  updateYtLink(sec);
}

function loadPlayer(startSec) { openInYouTube(startSec || 0); }

// ────────────────────────────────────────────────
// 타임라인 하이라이트 (경과 시간 기반)
// ────────────────────────────────────────────────
function startProgress() {
  stopProgress();
  progressTimer = setInterval(function() {
    if (!activeItem) return;
    const elapsed = Math.floor((Date.now() - playStartWall) / 1000);
    const cur = playStartSec + elapsed;
    const tl = activeItem.timeline;
    let node = null;
    for (let i = tl.length - 1; i >= 0; i--) {
      if (cur >= tl[i].secs) { node = tl[i]; break; }
    }
    document.querySelectorAll('#tlList .tl-btn').forEach(function(btn, i) {
      btn.classList.toggle('active', !!(node && tl[i] && tl[i].secs === node.secs));
    });
    const np = document.getElementById('nowPlaying');
    const nt = document.getElementById('nowText');
    if (node) { np.classList.remove('hidden'); nt.textContent = node.title; }
    else { np.classList.add('hidden'); }
  }, 1000);
}

function stopProgress() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

function updateYtLink(sec) {
  if (!activeItem) return;
  const url = 'https://www.youtube.com/watch?v=' + activeItem.id + (sec > 0 ? '&t=' + sec + 's' : '');
  const a = document.getElementById('ytLink');
  const t = document.getElementById('ytLinkText');
  if (a) a.href = url;
  if (t) t.textContent = sec > 0 ? '유튜브에서 ' + sec + '초 지점 보기' : '유튜브에서 보기';
}

// ────────────────────────────────────────────────
// 모달 열기 / 닫기
// ────────────────────────────────────────────────
function openModal(idx) {
  const item = db.find(function(d) { return d.index === idx; });
  if (!item) return;
  activeItem = item;

  document.getElementById('mCat').textContent   = item.categoryKo;
  document.getElementById('mTitle').textContent  = item.title;
  document.getElementById('mMeta').innerHTML     = '<i class="fa-regular fa-calendar mr-1"></i>' + item.date + ' &nbsp;|&nbsp; <span class="text-indigo-700 font-bold">' + item.month + ' 대예배</span>';
  document.getElementById('mSummary').textContent  = item.summary;
  document.getElementById('mNotes').textContent    = item.notes;
  document.getElementById('mSummaryM').textContent = item.summary;
  document.getElementById('mNotesM').textContent   = item.notes;

  updateYtLink(0);
  document.getElementById('nowPlaying').classList.add('hidden');

  // 타임라인 렌더링
  const tlList = document.getElementById('tlList');
  tlList.innerHTML = '';
  item.timeline.forEach(function(node) {
    const btn = document.createElement('button');
    btn.className = 'tl-btn w-full text-left text-xs bg-slate-50 border border-slate-200 p-3 rounded-xl flex items-center justify-between group gap-2';
    btn.onclick = function() {
      openInYouTube(node.secs);
      updateYtLink(node.secs);
    };
    btn.innerHTML =
      '<span class="flex items-center gap-2 min-w-0 flex-1 text-slate-700 font-medium group-hover:text-indigo-900">' +
        '<i class="fa-solid fa-play text-indigo-400 text-[10px] flex-shrink-0"></i>' +
        '<span class="truncate leading-snug">' + node.title + '</span>' +
      '</span>' +
      '<span class="tl-badge text-indigo-600 font-bold bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100 text-[11px] font-mono flex-shrink-0 ml-1">' + node.time + '</span>';
    tlList.appendChild(btn);
  });

  // 썸네일 표시 (클릭 전 상태)
  showThumb(item.id);

  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  stopProgress();
  // iframe src를 비워 재생 즉시 중단
  const box = document.getElementById('playerBox');
  box.innerHTML = '';
  activeItem = null;
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
}

// ────────────────────────────────────────────────
// 카드 렌더링 & 필터
// ────────────────────────────────────────────────
const sitLabel = { '상처치유':'🩹 상처치유','우울불안':'💭 우울불안','고난시련':'🔥 고난시련','실패결핍':'📉 실패결핍','분노용서':'⚓ 분노용서','가정가족':'🏠 가정가족','조급인내':'⏳ 조급인내' };

function renderCards(data) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  data.forEach(function(item) {
    const div = document.createElement('div');
    div.className = 'bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm sermon-card flex flex-col cursor-pointer';
    div.onclick = function() { openModal(item.index); };
    div.innerHTML =
      '<div class="p-6 flex-1">' +
        '<div class="flex items-center justify-between mb-3">' +
          '<span class="text-[11px] font-bold px-2.5 py-1 rounded-full border bg-indigo-50 text-indigo-950 border-indigo-200">' + item.categoryKo + '</span>' +
          '<span class="text-xs text-slate-400 font-bold serif">' + item.date + '</span>' +
        '</div>' +
        '<h4 class="font-bold text-slate-900 leading-snug mb-2 serif text-base hover:text-indigo-900 transition">' + item.title + '</h4>' +
        '<div class="text-xs flex items-center bg-slate-50 p-2 rounded-lg border border-slate-100 mb-3">' +
          '<span class="text-indigo-700 font-bold mr-2">' + (sitLabel[item.situation]||'🛡️') + '</span>' +
          '<span class="text-slate-300 mr-2">|</span>' +
          '<span class="truncate text-slate-500 font-light">' + item.scripture + '</span>' +
        '</div>' +
        '<p class="text-xs text-slate-500 font-light leading-relaxed line-clamp-3">' + item.summary + '</p>' +
      '</div>' +
      '<div class="px-6 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between text-xs">' +
        '<span class="text-indigo-600 font-bold flex items-center gap-1.5"><i class="fa-brands fa-youtube text-red-500"></i>영상 재생</span>' +
        '<span class="text-slate-400">' + item.timeline.length + '개 타임라인</span>' +
      '</div>';
    grid.appendChild(div);
  });
  document.getElementById('counter').innerHTML = '<i class="fa-solid fa-database mr-2 text-indigo-500"></i>검색 결과: <b>' + data.length + '개</b>';
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const yr = document.getElementById('yearFilter').value;
  const filtered = db.filter(function(item) {
    return (yr === 'all' || item.year === yr) &&
           (curMonth === 'all' || item.month === curMonth) &&
           (curSit === 'all' || item.situation === curSit) &&
           (!q || (item.title+item.summary+item.notes+item.scripture).toLowerCase().includes(q));
  });
  renderCards(filtered);
}

function setMonth(m) {
  curMonth = m;
  document.querySelectorAll('.tab-month').forEach(function(b) {
    b.classList.toggle('active-btn', b.dataset.month === m);
    if (b.dataset.month !== m) b.classList.add('bg-slate-100','text-slate-600');
    else { b.classList.remove('bg-slate-100','text-slate-600'); }
  });
  filterCards();
}

function setSit(s) {
  curSit = s;
  document.querySelectorAll('.tab-sit').forEach(function(b) {
    const on = b.dataset.sit === s;
    b.classList.toggle('active-btn', on);
    b.classList.toggle('bg-slate-100', !on);
    b.classList.toggle('text-slate-600', !on);
  });
  filterCards();
}

function buildMonthTabs() {
  const wrap = document.getElementById('monthTabs');
  wrap.innerHTML = '';
  const months = [...new Set(db.map(function(d){return d.month;}))].sort(function(a,b){return parseInt(a)-parseInt(b);});
  [['all','전체보기'],...months.map(function(m){return [m,m];})].forEach(function(pair) {
    const btn = document.createElement('button');
    btn.className = 'tab-month px-3 py-1.5 rounded-lg text-xs font-semibold transition ' + (pair[0]==='all'?'active-btn':'bg-slate-100 text-slate-600 hover:bg-slate-200');
    btn.dataset.month = pair[0];
    btn.textContent = pair[1];
    btn.onclick = function() { setMonth(pair[0]); };
    wrap.appendChild(btn);
  });
}

// ────────────────────────────────────────────────
// 등록 폼
// ────────────────────────────────────────────────
function toggleUpload() { document.getElementById('uploadSection').classList.toggle('hidden'); }

function saveSermon() {
  if (document.getElementById('fPw').value !== '1234') { showAlert('비밀번호 오류','error'); return; }
  const title = document.getElementById('fTitle').value.trim();
  let raw   = document.getElementById('fUrl').value.trim();
  const date = document.getElementById('fDate').value;
  const cat  = document.getElementById('fCategory').value;
  const sum  = document.getElementById('fSummary').value.trim();
  const notes= document.getElementById('fNotes').value.trim();
  const tlRaw= document.getElementById('fTimeline').value.trim();
  if (!title||!raw||!sum||!tlRaw) { showAlert('필수 항목을 모두 입력하세요','error'); return; }

  if (raw.includes('<iframe')) { const m=raw.match(/src=["']([^"']+)/); if(m) raw=m[1]; }
  let vid='';
  const m=raw.match(/(?:youtu\.be\/|embed\/|watch\?v=|&v=)([^#&?]{11})/);
  if(m) vid=m[1]; else if(raw.length===11) vid=raw;
  else { showAlert('유튜브 ID를 인식하지 못했습니다','error'); return; }

  const tl=[];
  tlRaw.split('\n').forEach(function(line){
    const r=line.match(/\[(\d{2}):(\d{2}):(\d{2})\](.*)/);
    if(r){ const s=+r[1]*3600+ +r[2]*60+ +r[3]; tl.push({time:'['+r[1]+':'+r[2]+':'+r[3]+']',secs:s,title:r[4].trim()}); }
  });

  const item={index:db.length+1,year:date.split('-')[0],id:vid,title,date,month:parseInt(date.split('-')[1])+'월',
    categoryKo:cat,scripture:title.split('—')[0].trim(),summary:sum,notes,timeline:tl,
    situation:classify(title,sum,notes)};
  db.unshift(item);
  localStorage.setItem('hs_db_v6',JSON.stringify(db));
  showAlert('등록 완료!','success');
  ['fTitle','fUrl','fSummary','fNotes','fTimeline','fPw'].forEach(function(id){document.getElementById(id).value='';});
  toggleUpload(); buildMonthTabs(); filterCards();
}

function resetDB() {
  if (!confirm('데이터를 초기화하시겠습니까?')) return;
  localStorage.removeItem('hs_db_v6'); init();
}

// ────────────────────────────────────────────────
// 알림
// ────────────────────────────────────────────────
function showAlert(msg, type) {
  const icon=document.getElementById('alertIcon');
  document.getElementById('alertTitle').textContent = type==='error'?'오류':type==='success'?'성공':'알림';
  document.getElementById('alertMsg').textContent = msg;
  icon.className='w-12 h-12 rounded-full flex items-center justify-center mx-auto text-xl '+(type==='error'?'bg-red-100 text-red-700':type==='success'?'bg-green-100 text-green-700':'bg-indigo-100 text-indigo-900');
  icon.innerHTML='<i class="fa-solid '+(type==='error'?'fa-circle-xmark':type==='success'?'fa-circle-check':'fa-circle-info')+'"></i>';
  document.getElementById('alertModal').classList.remove('hidden');
}

// ────────────────────────────────────────────────
// 초기화
// ────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('hs_db_v6');
  if (saved) {
    db = JSON.parse(saved);
  } else {
    db = masterInitialDatabase.map(function(item) {
      return Object.assign({}, item, { situation: classify(item.title, item.summary, item.notes) });
    });
    localStorage.setItem('hs_db_v6', JSON.stringify(db));
  }
  buildMonthTabs();
  filterCards();
}

window.onload = init;
</script>
</body>
